<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Combat Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080a0f;
  --surface: #0c0f15;
  --border: #1a2030;
  --sun:        #f5c842;
  --sun-glow:   #f5c84220;
  --storm:      #4ade80;   /* green */
  --storm-glow: #4ade8020;
  --moon:       #60a5fa;   /* blue  */
  --moon-glow:  #60a5fa20;
  --text: #e8dcc8;
  --muted: #4a5568;
  --accent: #c8a96e;
  --g1: #e07b4f; --g1-dim: #e07b4f22;
  --g2: #4fa8e0; --g2-dim: #4fa8e022;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; }
body {
  background:var(--bg); color:var(--text);
  font-family:'Crimson Pro',serif;
  height:100dvh; overflow:hidden; user-select:none;
  display:flex; flex-direction:column;
}
body::before {
  content:''; position:fixed; inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 0%,#1a0a2e1a 0%,transparent 55%),
    radial-gradient(ellipse 60% 60% at 85% 100%,#0a1a2e1a 0%,transparent 55%);
  pointer-events:none; z-index:0;
}
.stars { position:fixed; inset:0; pointer-events:none; z-index:0; }
.star  { position:absolute; border-radius:50%; background:white; opacity:0;
         animation:twinkle var(--dur,3s) ease-in-out infinite var(--delay,0s); }
@keyframes twinkle { 0%,100%{opacity:0} 50%{opacity:var(--op,.5)} }

/* ══ TOP BAR ══ */
.topbar {
  position:relative; z-index:20; height:44px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 12px; border-bottom:1px solid var(--border);
  flex-shrink:0; gap:8px;
}
.topbar-left  { display:flex; align-items:center; gap:8px; min-width:0; }
.topbar-right { display:flex; align-items:center; gap:6px; flex-shrink:0; }
.site-title {
  font-family:'Cinzel',serif; font-size:0.68rem; font-weight:900;
  letter-spacing:0.16em; color:var(--accent); white-space:nowrap; flex-shrink:0;
}
.vbar { width:1px; height:14px; background:var(--border); flex-shrink:0; }

.group-toggle { display:flex; border:1px solid var(--border); border-radius:3px; overflow:hidden; flex-shrink:0; }
.group-btn {
  font-family:'Cinzel',serif; font-size:0.6rem; font-weight:600;
  letter-spacing:0.09em; padding:4px 11px; border:none; cursor:pointer;
  background:transparent; color:var(--muted); transition:all .15s; white-space:nowrap;
}
.group-btn+.group-btn { border-left:1px solid var(--border); }
.group-btn.g1.active { background:var(--g1); color:#080a0f; }
.group-btn.g2.active { background:var(--g2); color:#080a0f; }
.group-btn:not(.active):hover { color:var(--accent); }

.mode-toggle { display:flex; border:1px solid var(--border); border-radius:3px; overflow:hidden; flex-shrink:0; }
.mode-btn {
  font-family:'Cinzel',serif; font-size:0.58rem; font-weight:600;
  letter-spacing:0.06em; padding:4px 9px; border:none; cursor:pointer;
  background:transparent; color:var(--muted); transition:all .15s; white-space:nowrap;
}
.mode-btn+.mode-btn { border-left:1px solid var(--border); }
.mode-btn.active { background:#c8a96e12; color:var(--accent); }
.mode-btn:not(.active):hover { color:var(--text); }

/* ══ STAGE BAR ══ */
.stagebar {
  position:relative; z-index:19; height:40px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 12px; border-bottom:1px solid var(--border);
  flex-shrink:0; gap:8px;
}
.stagebar.hidden-bar { display:none; }
.stage-nav-btn {
  font-family:'Cinzel',serif; font-size:0.62rem; font-weight:600;
  letter-spacing:0.07em; padding:5px 14px; border-radius:3px;
  border:1px solid var(--border); cursor:pointer;
  background:transparent; color:var(--muted); transition:all .15s; flex-shrink:0;
}
.stage-nav-btn:hover:not(:disabled) { border-color:var(--accent); color:var(--accent); }
.stage-nav-btn:disabled { opacity:0.2; cursor:not-allowed; }
.stage-center { display:flex; align-items:center; gap:10px; flex:1; justify-content:center; }
.stage-center-num { font-family:'Cinzel',serif; font-size:1rem; font-weight:900; color:var(--accent); line-height:1; }
.stage-center-label { font-family:'Cinzel',serif; font-size:0.48rem; letter-spacing:0.26em; color:var(--muted); }
.stage-dots { display:flex; gap:7px; align-items:center; }
.stage-dot {
  width:6px; height:6px; border-radius:50%;
  border:1px solid var(--muted); cursor:pointer; transition:all .15s; background:transparent;
}
.stage-dot.active { background:var(--accent); border-color:var(--accent); box-shadow:0 0 4px var(--accent); }
.stage-dot.done   { background:#c8a96e2a; border-color:#c8a96e44; }

/* ══ MAIN ══ */
.main { position:relative; z-index:1; flex:1; display:flex; flex-direction:column; overflow:hidden; min-height:0; }
.hidden { display:none !important; }

/* ══════════════════════════════════════════════════════
   DESKTOP: carousel shows ONLY the current stage page
             (all 4 exist in DOM for mobile swipe,
              but only one is visible on desktop via CSS)
   MOBILE:  horizontal snap, one page per stage
══════════════════════════════════════════════════════ */
.stage-carousel {
  flex:1; min-height:0;
  /* Mobile: horizontal scroll container */
  display:flex; flex-direction:row;
  overflow-x:scroll; overflow-y:hidden;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.stage-carousel::-webkit-scrollbar { display:none; }

/* Each stage page */
.stage-page {
  flex:0 0 100%; width:100%;
  scroll-snap-align:start; scroll-snap-stop:always;
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:1px; background:var(--border);
  /* Mobile: columns overflow vertically inside the page */
  overflow-y:auto; overflow-x:hidden;
  min-height:0;
}

/* Desktop: carousel doesn't scroll horizontally — we control visibility */
@media(min-width:601px) {
  .stage-carousel {
    overflow-x:hidden; /* no horizontal scroll on desktop */
    scroll-snap-type:none;
  }
  .stage-page {
    display:none;          /* hide all by default */
    overflow-y:hidden;     /* columns handle their own scroll */
  }
  .stage-page.active {
    display:grid;          /* only active page shows */
    flex:1; width:100%;
  }
}

/* ── Move columns ── */
.move-col {
  background:var(--surface); display:flex; flex-direction:column;
  align-items:center; overflow-y:auto; padding:0 0 8px;
  min-height:0;
}
/* Mobile: columns don't self-scroll, parent page does */
@media(max-width:600px){
  .move-col { overflow-y:visible; flex-shrink:0; border-bottom:1px solid var(--border); }
  .move-col:last-child { border-bottom:none; }
}

.move-col-header {
  position:sticky; top:0; background:var(--surface); width:100%;
  display:flex; align-items:center; justify-content:center; gap:6px;
  padding:6px 0 5px; border-bottom:1px solid var(--border); z-index:2; flex-shrink:0;
}
.move-col-num { font-family:'Cinzel',serif; font-size:1rem; font-weight:900; color:var(--accent); line-height:1; }
.move-col-sub { font-family:'Cinzel',serif; font-size:0.44rem; letter-spacing:0.18em; color:var(--muted); }

.move-col-roles { display:flex; flex-direction:column; align-items:center; padding:8px 10px 0; width:100%; gap:0; }

.role-section { display:flex; flex-direction:column; align-items:center; width:100%; }
.role-section+.role-section { margin-top:6px; padding-top:6px; border-top:1px solid var(--border); }
.role-tag { font-family:'Cinzel',serif; font-size:0.44rem; letter-spacing:0.14em; color:var(--muted); margin-bottom:5px; }

.action-seq  { display:flex; flex-direction:column; align-items:center; width:100%; gap:0; }
.action-item { display:flex; flex-direction:column; align-items:center; width:100%; }
.connector   { width:1px; height:6px; background:linear-gradient(to bottom,#1e2a3a,transparent); }

.action-node {
  display:flex; align-items:center; justify-content:center;
  border-radius:4px; border:1px solid transparent; width:100%;
}
.action-node.move { gap:6px; padding:6px 6px; border-color:#1c2840; background:#080f1e; }
.action-node.stay { padding:6px 6px; border-color:#1c2840; background:#080f1e; }
.action-node.weapons { padding:4px 0; gap:4px; flex-wrap:wrap; border:none; background:none; }
.action-node.no-change { padding:3px; border:none; background:none; opacity:0.18; }

/* Location text abbreviations */
.loc-block  { display:flex; flex-direction:column; align-items:center; gap:1px; flex:1; }
.loc-abbr   {
  font-family:'Cinzel',serif; font-size:0.6rem; font-weight:700;
  letter-spacing:0.04em; color:var(--text); line-height:1;
}
.move-arrow { font-size:0.7rem; color:#2a3a55; flex-shrink:0; }
.nc-dots    { font-size:0.75rem; letter-spacing:0.25em; color:var(--muted); }

.weapon-badge {
  display:flex; align-items:center; gap:3px;
  padding:3px 8px; border-radius:40px; border:1px solid;
  font-family:'Cinzel',serif; font-size:0.5rem; font-weight:600; letter-spacing:0.04em;
}
.weapon-badge.sun   { border-color:var(--sun);   color:var(--sun);   background:var(--sun-glow); }
.weapon-badge.storm { border-color:var(--storm); color:var(--storm); background:var(--storm-glow); }
.weapon-badge.moon  { border-color:var(--moon);  color:var(--moon);  background:var(--moon-glow); }

/* ── Simple columns ── */
.simple-col {
  background:var(--surface); display:flex; flex-direction:column;
  align-items:center; overflow-y:auto; padding:0 0 8px; min-height:0;
}
@media(max-width:600px){
  .simple-col { overflow-y:visible; flex-shrink:0; border-bottom:1px solid var(--border); }
  .simple-col:last-child { border-bottom:none; }
}
.simple-col-header {
  position:sticky; top:0; background:var(--surface); width:100%;
  display:flex; align-items:center; justify-content:center; gap:6px;
  padding:6px 0 5px; border-bottom:1px solid var(--border); z-index:2; flex-shrink:0;
}
.simple-col-num { font-family:'Cinzel',serif; font-size:1rem; font-weight:900; color:var(--accent); line-height:1; }
.simple-col-sub { font-family:'Cinzel',serif; font-size:0.44rem; letter-spacing:0.18em; color:var(--muted); }
.simple-col-body {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:10px 10px; gap:8px; width:100%;
}
.simple-locs      { display:flex; align-items:center; justify-content:center; gap:6px; width:100%; }
.simple-loc-arrow { font-size:1rem; color:#2a3a55; flex-shrink:0; }

.s-loc-block {
  display:flex; flex-direction:column; align-items:center; gap:5px;
  flex:1; padding:8px 6px; border-radius:5px;
  border:1px solid var(--border); background:#ffffff04; min-width:0;
}
.s-loc-abbr  {
  font-family:'Cinzel',serif; font-size:0.7rem; font-weight:700;
  letter-spacing:0.05em; color:var(--text); line-height:1;
}
.s-weapons { display:flex; gap:4px; flex-wrap:wrap; justify-content:center; }
.s-badge {
  display:flex; align-items:center; gap:4px;
  padding:4px 9px; border-radius:40px; border:1px solid;
  font-family:'Cinzel',serif; font-size:0.58rem; font-weight:600; letter-spacing:0.06em;
}
.s-badge.sun   { border-color:var(--sun);   color:var(--sun);   background:var(--sun-glow); }
.s-badge.storm { border-color:var(--storm); color:var(--storm); background:var(--storm-glow); }
.s-badge.moon  { border-color:var(--moon);  color:var(--moon);  background:var(--moon-glow); }
.s-badge.none  { border-color:var(--border); color:var(--muted); opacity:0.3; font-size:0.52rem; }

/* ══ OVERVIEW ══ */
.overview-view { flex:1; overflow-y:auto; overflow-x:hidden; padding:10px 10px 20px; }
.ov-stage-block { margin-bottom:12px; }
.ov-stage-title {
  font-family:'Cinzel',serif; font-size:0.54rem; font-weight:900;
  letter-spacing:0.26em; color:var(--accent); padding:0 0 7px; text-align:center;
}
.ov-groups { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
@media(max-width:400px){ .ov-groups { grid-template-columns:1fr; } }
.ov-group { border:1px solid var(--border); border-radius:4px; overflow:hidden; }
.ov-group-title {
  font-family:'Cinzel',serif; font-size:0.48rem; font-weight:600;
  letter-spacing:0.16em; padding:5px 8px; text-align:center;
  border-bottom:1px solid var(--border);
}
.ov-group.grp1 .ov-group-title { color:var(--g1); background:var(--g1-dim); }
.ov-group.grp2 .ov-group-title { color:var(--g2); background:var(--g2-dim); }
.ov-moves { display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--border); }
.ov-move  {
  background:var(--surface); padding:6px 4px;
  display:flex; flex-direction:column; align-items:center; gap:4px;
}
.ov-move-num  { font-family:'Cinzel',serif; font-size:0.42rem; letter-spacing:0.16em; color:var(--muted); }
.ov-locs      { display:flex; align-items:center; justify-content:center; gap:3px; width:100%; }
.ov-loc-arrow { font-size:0.55rem; color:#2a3a55; }
.ov-loc-block {
  display:flex; flex-direction:column; align-items:center; gap:3px; flex:1;
  padding:4px 3px; border-radius:3px; border:1px solid var(--border);
  background:#ffffff03; min-width:0;
}
.ov-loc-abbr { font-family:'Cinzel',serif; font-size:0.4rem; font-weight:700; color:var(--text); letter-spacing:0.02em; line-height:1; }
.ov-dots     { display:flex; gap:3px; flex-wrap:wrap; justify-content:center; }
.ov-dot      { width:7px; height:7px; border-radius:50%; }
.ov-dot.sun   { background:var(--sun);   box-shadow:0 0 3px var(--sun); }
.ov-dot.storm { background:var(--storm); box-shadow:0 0 3px var(--storm); }
.ov-dot.moon  { background:var(--moon);  box-shadow:0 0 3px var(--moon); }
.ov-dot.none  { background:var(--border); }
.ov-divider   { height:1px; background:var(--border); margin:8px 0; }

/* ══ BOTTOM ══ */
.bottom-bar {
  position:relative; z-index:10; height:32px;
  display:flex; align-items:center; justify-content:center;
  border-top:1px solid var(--border); flex-shrink:0;
}
.kb-hint { font-size:0.52rem; color:#252e3a; letter-spacing:0.07em; font-style:italic; }
@media(max-width:600px){ .bottom-bar { display:none; } }
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<div class="topbar">
  <div class="topbar-left">
    <div class="site-title">☽ GUIDE ☀</div>
    <div class="vbar"></div>
    <div class="group-toggle" id="groupToggle">
      <button class="group-btn g1 active" onclick="selectGroup(1)">G1</button>
      <button class="group-btn g2"        onclick="selectGroup(2)">G2</button>
    </div>
  </div>
  <div class="topbar-right">
    <div class="mode-toggle">
      <button class="mode-btn active" onclick="setMode('detail')">DETAIL</button>
      <button class="mode-btn"        onclick="setMode('simple')">SIMPLE</button>
      <button class="mode-btn"        onclick="setMode('overview')">OVERVIEW</button>
    </div>
  </div>
</div>

<div class="stagebar" id="stagebar">
  <button class="stage-nav-btn" id="stagePrev" onclick="changeStage(-1)">← STAGE</button>
  <div class="stage-center">
    <div class="stage-center-label">STAGE</div>
    <div class="stage-center-num" id="stageNum">1</div>
    <div class="stage-dots" id="stageDots"></div>
  </div>
  <button class="stage-nav-btn" id="stageNext" onclick="changeStage(1)">STAGE →</button>
</div>

<div class="main">
  <div class="stage-carousel" id="detailCarousel"></div>
  <div class="stage-carousel hidden" id="simpleCarousel"></div>
  <div class="overview-view  hidden" id="overviewView"></div>
</div>

<div class="bottom-bar">
  <div class="kb-hint">1 2 3 4 · jump stage &nbsp;|&nbsp; ← → · prev/next stage</div>
</div>

<script>
// ─── DATA ─────────────────────────────────────────────────────────────────────
const LOC = {
  P:  { abbr:'PAG',   name:'Pagoda'    },
  C:  { abbr:'COURT', name:'Courtyard' },
  Ce: { abbr:'CEM',   name:'Cemetery'  },
};
const WEAPON = {
  S:  { name:'Sun',   cls:'sun'   },
  St: { name:'Storm', cls:'storm' },
  M:  { name:'Moon',  cls:'moon'  },
};

function parseMove(locStr, arStr, saStr) {
  const lp = locStr.split('-');
  const ar = arStr ? arStr.split(',') : [];
  const sa = saStr ? saStr.split(',') : [];
  if (lp.length === 1) {
    return [{ loc:LOC[lp[0]], archer:ar.map(w=>WEAPON[w.trim()]).filter(Boolean), sa:sa.map(w=>WEAPON[w.trim()]).filter(Boolean) }];
  }
  return [
    { loc:LOC[lp[0]], archer:ar[0]?[WEAPON[ar[0].trim()]].filter(Boolean):[], sa:sa[0]?[WEAPON[sa[0].trim()]].filter(Boolean):[] },
    { loc:LOC[lp[1]], archer:ar[1]?[WEAPON[ar[1].trim()]].filter(Boolean):[], sa:sa[1]?[WEAPON[sa[1].trim()]].filter(Boolean):[] },
  ];
}

const stages = [
  [
    {g1:parseMove('P',   null,   'S,M'),  g2:parseMove('Ce',  null,  'St')   },
    {g1:parseMove('C',   null,   'M,St'), g2:parseMove('Ce',  null,  'S')    },
    {g1:parseMove('P-C', null,   'St'),   g2:parseMove('Ce-C',',S',   'M')    },
  ],[
    {g1:parseMove('Ce',  null,   'St'),   g2:parseMove('C',   null,  'S,M')  },
    {g1:parseMove('Ce-C',null,   'M'),    g2:parseMove('P-C', ',S',   'St')   },
    {g1:parseMove('P',   null,   'M,S'),  g2:parseMove('C',   null,  'St')   },
  ],[
    {g1:parseMove('C-P', null,   'St,M'), g2:parseMove('Ce',  null,  'S')    },
    {g1:parseMove('P-C', null,   'M'),    g2:parseMove('Ce-C',',S',   'St')   },
    {g1:parseMove('C',   null,   'M'),    g2:parseMove('P',   null,  'S,St') },
  ],[
    {g1:parseMove('C-Ce','St,S', 'M'),    g2:parseMove('P',   'S',   'St,M') },
    {g1:parseMove('C-Ce',   'St,S', 'M'),    g2:parseMove('P',   'S,M', 'St')   },
    {g1:parseMove('C',   'St',   'M,S'),  g2:parseMove('P-Ce','S,M', 'St')   },
  ],
];

let currentGroup = 1, currentStage = 0, currentMode = 'detail';

// ─── HTML BUILDERS ────────────────────────────────────────────────────────────
function locBlockInline(loc) {
  return `<div class="loc-block"><div class="loc-abbr">${loc.abbr}</div></div>`;
}
function detailLocHTML(locs) {
  if (locs.length === 1)
    return `<div class="action-node stay">${locBlockInline(locs[0].loc)}</div>`;
  return `<div class="action-node move">${locBlockInline(locs[0].loc)}<div class="move-arrow">→</div>${locBlockInline(locs[1].loc)}</div>`;
}
function weaponBadges(weapons) {
  if (!weapons.length) return `<div class="action-node no-change"><div class="nc-dots">· · ·</div></div>`;
  return `<div class="action-node weapons">${weapons.map(w=>`<div class="weapon-badge ${w.cls}">${w.name}</div>`).join('')}</div>`;
}
function moveColHTML(move, mi, gKey) {
  const locs = move[gKey];
  const locH = detailLocHTML(locs);
  const allAr = locs.flatMap(l=>l.archer);
  const allSa = locs.flatMap(l=>l.sa);
  return `<div class="move-col">
    <div class="move-col-header"><div class="move-col-num">${mi+1}</div><div class="move-col-sub">MOVE</div></div>
    <div class="move-col-roles">
      <div class="role-section">
        <div class="role-tag">🏹 ARCHER</div>
        <div class="action-seq">
          <div class="action-item">${locH}</div>
          <div class="action-item"><div class="connector"></div>${weaponBadges(allAr)}</div>
        </div>
      </div>
      <div class="role-section">
        <div class="role-tag">⚔️ NON-ARCHER</div>
        <div class="action-seq">
          <div class="action-item">${locH}</div>
          <div class="action-item"><div class="connector"></div>${weaponBadges(allSa)}</div>
        </div>
      </div>
    </div>
  </div>`;
}

function sLocBlock(locEntry) {
  const allW = [...locEntry.archer,...locEntry.sa];
  const seen = new Set();
  const uniq = allW.filter(w=>{ if(seen.has(w.cls)) return false; seen.add(w.cls); return true; });
  const wHTML = uniq.length
    ? uniq.map(w=>`<div class="s-badge ${w.cls}">${w.name}</div>`).join('')
    : `<div class="s-badge none">—</div>`;
  return `<div class="s-loc-block"><div class="s-loc-abbr">${locEntry.loc.abbr}</div><div class="s-weapons">${wHTML}</div></div>`;
}
function simpleColHTML(move, mi, gKey) {
  const locs = move[gKey];
  const body = locs.length === 1
    ? `<div class="simple-locs">${sLocBlock(locs[0])}</div>`
    : `<div class="simple-locs">${sLocBlock(locs[0])}<div class="simple-loc-arrow">→</div>${sLocBlock(locs[1])}</div>`;
  return `<div class="simple-col">
    <div class="simple-col-header"><div class="simple-col-num">${mi+1}</div><div class="simple-col-sub">MOVE</div></div>
    <div class="simple-col-body">${body}</div>
  </div>`;
}

function stagePageHTML(si, gKey, colFn) {
  return `<div class="stage-page${si===currentStage?' active':''}" data-stage="${si}">
    ${stages[si].map((move,mi)=>colFn(move,mi,gKey)).join('')}
  </div>`;
}

function ovLocBlock(locEntry) {
  const allW = [...locEntry.archer,...locEntry.sa];
  const seen = new Set();
  const uniq = allW.filter(w=>{ if(seen.has(w.cls)) return false; seen.add(w.cls); return true; });
  const dots = uniq.length ? uniq.map(w=>`<div class="ov-dot ${w.cls}"></div>`).join('') : `<div class="ov-dot none"></div>`;
  return `<div class="ov-loc-block"><div class="ov-loc-abbr">${locEntry.loc.abbr}</div><div class="ov-dots">${dots}</div></div>`;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderCarousels() {
  const gKey = `g${currentGroup}`;
  document.getElementById('detailCarousel').innerHTML =
    stages.map((_,si)=>stagePageHTML(si,gKey,moveColHTML)).join('');
  document.getElementById('simpleCarousel').innerHTML =
    stages.map((_,si)=>stagePageHTML(si,gKey,simpleColHTML)).join('');
  snapToStage('detailCarousel');
  snapToStage('simpleCarousel');
}
function renderOverview() {
  document.getElementById('overviewView').innerHTML = stages.map((sd,si)=>{
    const gHTML = [1,2].map(g=>{
      const gKey=`g${g}`;
      const mHTML = sd.map((move,mi)=>{
        const locs=move[gKey];
        const lH = locs.length===1
          ? `<div class="ov-locs">${ovLocBlock(locs[0])}</div>`
          : `<div class="ov-locs">${ovLocBlock(locs[0])}<div class="ov-loc-arrow">→</div>${ovLocBlock(locs[1])}</div>`;
        return `<div class="ov-move"><div class="ov-move-num">M${mi+1}</div>${lH}</div>`;
      }).join('');
      return `<div class="ov-group grp${g}"><div class="ov-group-title">GROUP ${g}</div><div class="ov-moves">${mHTML}</div></div>`;
    }).join('');
    return `<div class="ov-stage-block"><div class="ov-stage-title">STAGE ${si+1}</div><div class="ov-groups">${gHTML}</div></div>
            ${si<stages.length-1?'<div class="ov-divider"></div>':''}`;
  }).join('');
}
function renderStagebar() {
  document.getElementById('stageNum').textContent = currentStage+1;
  document.getElementById('stageDots').innerHTML = stages.map((_,i)=>
    `<div class="stage-dot ${i===currentStage?'active':i<currentStage?'done':''}" onclick="selectStage(${i})"></div>`
  ).join('');
  document.getElementById('stagePrev').disabled = currentStage===0;
  document.getElementById('stageNext').disabled = currentStage===stages.length-1;
  const ov = currentMode==='overview';
  document.getElementById('stagebar').classList.toggle('hidden-bar', ov);
  document.getElementById('groupToggle').classList.toggle('hidden', ov);
}
function render() {
  renderStagebar();
  document.getElementById('detailCarousel').classList.toggle('hidden', currentMode!=='detail');
  document.getElementById('simpleCarousel').classList.toggle('hidden', currentMode!=='simple');
  document.getElementById('overviewView').classList.toggle('hidden', currentMode!=='overview');
  document.querySelectorAll('.mode-btn').forEach((b,i)=>
    b.classList.toggle('active',['detail','simple','overview'][i]===currentMode));
  if (currentMode!=='overview') renderCarousels();
  else renderOverview();
}

// ─── CAROUSEL ─────────────────────────────────────────────────────────────────
function markActivePages() {
  document.querySelectorAll('.stage-page').forEach(p=>{
    p.classList.toggle('active', parseInt(p.dataset.stage)===currentStage);
  });
}
function snapToStage(id) {
  const el = document.getElementById(id);
  if (!el) return;
  requestAnimationFrame(()=>{
    const page = el.querySelector(`.stage-page[data-stage="${currentStage}"]`);
    if (!page) return;
    el.scrollTo({ left:page.offsetLeft, behavior:'instant' });
    markActivePages();
  });
}
function initCarouselSync(id) {
  const el = document.getElementById(id);
  if (!el) return;
  let ticking = false;
  el.addEventListener('scroll', ()=>{
    if (ticking) return; ticking=true;
    requestAnimationFrame(()=>{
      const w = el.clientWidth;
      if (!w) { ticking=false; return; }
      const idx = Math.round(el.scrollLeft/w);
      if (idx!==currentStage && idx>=0 && idx<stages.length) {
        currentStage=idx;
        renderStagebar();
        markActivePages();
        const other = id==='detailCarousel'?'simpleCarousel':'detailCarousel';
        snapToStage(other);
      }
      ticking=false;
    });
  },{passive:true});
}

// ─── CONTROLS ─────────────────────────────────────────────────────────────────
function selectGroup(g) {
  currentGroup=g;
  document.querySelectorAll('.group-btn').forEach((b,i)=>b.classList.toggle('active',i+1===g));
  render();
}
function selectStage(i) {
  currentStage=i; renderStagebar(); snapToStage('detailCarousel'); snapToStage('simpleCarousel');
}
function changeStage(dir) {
  const s=currentStage+dir;
  if(s<0||s>=stages.length) return;
  currentStage=s; renderStagebar(); snapToStage('detailCarousel'); snapToStage('simpleCarousel');
}
function setMode(m) { currentMode=m; render(); }

document.addEventListener('keydown', e=>{
  if(currentMode!=='overview'){
    if(e.key==='ArrowLeft')  changeStage(-1);
    if(e.key==='ArrowRight') changeStage(1);
  }
  if(e.key==='1') selectStage(0);
  if(e.key==='2') selectStage(1);
  if(e.key==='3') selectStage(2);
  if(e.key==='4') selectStage(3);
});

// ─── STARS ────────────────────────────────────────────────────────────────────
(function(){
  const c=document.getElementById('stars');
  for(let i=0;i<50;i++){
    const s=document.createElement('div'); s.className='star';
    const sz=Math.random()*1.4+0.3;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${2+Math.random()*5}s;--delay:${Math.random()*6}s;--op:${0.15+Math.random()*0.35}`;
    c.appendChild(s);
  }
})();

render();
requestAnimationFrame(()=>{ initCarouselSync('detailCarousel'); initCarouselSync('simpleCarousel'); });
</script>
</body>
</html>
